<!DOCTYPE html>
<html>
    <head>
        <title>VOP UI v0.3.1</title>
        <style>
            body {
                background:     #111;
                color:          #0f0;
                font-family:    'Courier New', monospace;
                padding:        30px;                
            }

            .panel {
                border:         1px solid #0f0;
                padding:        15px;
                margin-bottom:  10px;
            }

            input {
                background:     #000;
                color:          #0f0;
                border:         1px solid #333;
                padding:        5px;
            }

            label {
                display:        inline-block;
                width:          140px;
            }
            
            button {
                background:     #0f0;
                color:          #000;
                border:         none;
                padding:        15px;
                font-weight:    bold;
                cursor:         pointer;
                width:          100%;
            }
        </style>
    </head>
    <body>
        <h2>VOP PHASE I: SINGLE FRAME SMEAR</h2>

        <div class="panel">

            <label>IMAGE NAME:</label>
            <input id="image" value="vop_logo_mockup_400px.png" style="width: 250px;"><br>

            <label>SMEAR (SEC):</label>
            <input id="smear" type="number" value="15.0"><br>
            
            <label>FOV:</label>
            <input id="fov" type="number" value="45.0">
            
            <label>GAIN:</label>
            <input id="gain" type="number" value="1.0">

        </div>
        <div class="panel">
            
            <label>POS START:</label>
            <input id="p_start" value="0.0,0.0,-2.0">

            <label>POS END:</label>
            <input id="p_end"   value="0.0,0.0,-2">

            <label>ROT START:</label>
            <input id="r_start" value="0,0,0">

            <label>ROT END:</label>
            <input id="r_end"   value="0,0,0">
        </div>

        <button onclick="triggerSmear()">EXECUTE OPTICAL SMEAR</button>

        <script>
            async function triggerSmear() {
                const data = {
                    image:      document.getElementById('image').value,
                    smear:      document.getElementById('smear').value,
                    fov:        document.getElementById('fov').value,
                    pos_start:  document.getElementById('p_start').value,
                    pos_end:    document.getElementById('p_end').value,
                    rot_start:  document.getElementById('r_start').value,
                    rot_end:    document.getElementById('r_end').value
                };
                
                const resp = await fetch('/execute_smear', {
                    method:     'POST',
                    headers:    {'Content-Type': 'application/json'},
                    body:       JSON.stringify(data)
                });
                const res = await resp.json();
                alert(res.message);
            }
        </script>
    </body>
</html>
