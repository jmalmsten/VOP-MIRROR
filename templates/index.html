<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VOP v0.5.1 - Bézier Exposure Sheet</title>
    <style>
        body { background: #080808; color: #ccc; font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        .top-deck { display: flex; gap: 20px; padding: 20px; background: #000; border-bottom: 2px solid #333; height: 180px; box-sizing: border-box; }
        .probe-deck { flex: 1; border-right: 1px solid #222; padding-right: 20px; }
        .control-deck { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .x-sheet { width: 100vw; overflow-x: auto; padding: 20px; box-sizing: border-box; }
        table { border-collapse: collapse; width: 100%; min-width: 1600px; }
        th { background: #1a1a1a; color: #0cf; padding: 10px; border: 1px solid #333; font-size: 0.7em; text-align: left; }
        td { border: 1px solid #222; padding: 8px; position: relative; }
        .key-row-1 { background: rgba(255,0,0,0.05); }
        .key-row-2 { background: rgba(0,255,0,0.05); }
        .key-row-3 { background: rgba(0,0,255,0.05); }
        input, select { background: #000; border: 1px solid #444; color: #fff; padding: 8px; width: 100%; box-sizing: border-box; font-family: inherit; }
        .toggle-box { display: flex; gap: 5px; margin-top: 5px; }
        .toggle-box label { font-size: 0.6em; color: #555; }
        .hud-msg { color: #0cf; font-weight: bold; }
        .progress-bar { height: 12px; background: #222; width: 100%; border: 1px solid #333; }
        .progress-fill { height: 100%; background: #0cf; transition: width 0.5s; width: 0%; }
        .panic-btn { background: #400; color: #f66; border: 1px solid #622; padding: 10px; cursor: pointer; }
        .exec-btn { background: #044; color: #0ff; border: 1px solid #066; padding: 15px; cursor: pointer; font-weight: bold; font-size: 1.1em; }
        fieldset[disabled] { opacity: 0.5; pointer-events: none; filter: grayscale(1); }
    </style>
</head>
<body>
    <div class="top-deck">
        <div class="probe-deck">
            <h4 style="margin:0 0 10px 0; color:#555">SUBFRAME PROBE</h4>
            <div style="display:flex; gap:20px">
                <div style="flex:1"><label>MASTER FR: <span id="val_frame">1</span></label><input type="range" id="probe_frame" step="1"></div>
                <div style="flex:1"><label>SMEAR POINT: <span id="val_sub">50</span>%</label><input type="range" id="probe_sub" min="0" max="1" step="0.01" value="0.5"></div>
            </div>
            <button style="margin-top:15px; width:100%; background:#222; color:#fff; border:1px solid #444; padding:8px; cursor:pointer" onclick="runTask('preview')">VIEW SUBFRAME PROBE</button>
        </div>
        
        <div class="control-deck">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <span class="hud-msg" id="st_msg">SYSTEM IDLE</span>
                <span style="font-size:0.8em">REMAINING: <b id="st_eta">00:00</b></span>
            </div>
            <div id="st_frame" style="font-size:0.9em">FRAME 0 / 0</div>
            <div class="progress-bar"><div class="progress-fill" id="st_bar"></div></div>
            <div style="display:flex; gap:10px; margin-top:5px">
                <button id="exec-btn" class="exec-btn" style="flex:3" onclick="runTask('sequence')">EXECUTE OPTICAL SEQUENCE</button>
                <button class="panic-btn" style="flex:1" onclick="panic()">PANIC</button>
                <button class="panic-btn" style="flex:1; background:#200;" onclick="nukeMag()">NUKE</button>
            </div>
        </div>
    </div>

    <fieldset id="main-fields">
    <div class="x-sheet">
        <table>
            <thead>
                <tr>
                    <th style="width:80px">KEY</th>
                    <th style="width:100px">MASTER FR</th>
                    <th>POSITION (XYZ)
                        <select id="p_mode" style="font-size:0.8em; padding:2px; margin-top:5px">
                            <option value="linear">LINEAR</option><option value="smooth">SMOOTH</option>
                        </select>
                    </th>
                    <th>ROTATION (PRY)
                        <select id="r_mode" style="font-size:0.8em; padding:2px; margin-top:5px">
                            <option value="linear">LINEAR</option><option value="smooth">SMOOTH</option>
                        </select>
                    </th>
                    <th style="width:120px">SMEAR (SEC)
                        <select id="s_mode" style="font-size:0.8em; padding:2px; margin-top:5px">
                            <option value="linear">LINEAR</option><option value="smooth">SMOOTH</option>
                        </select>
                    </th>
                    <th style="width:100px">SHUTTER DISC</th>
                    <th style="width:100px">PHASE</th>
                    <th style="width:80px">FILTER</th>
                    <th style="width:250px">GLOBAL CONSTANTS</th>
                </tr>
            </thead>
            <tbody>
                <tr class="key-row-1">
                    <td style="color:#f66">KEY 1</td>
                    <td><input id="f1" type="number" oninput="syncProbeRange()"></td>
                    <td><input id="p1"></td>
                    <td><input id="r1"></td>
                    <td><input id="s1" type="number" step="0.1"></td>
                    <td><input id="sd1" type="number" step="0.1"></td>
                    <td><input id="ph1" type="number" step="0.1"></td>
                    <td><input type="color" id="c1_hex"></td>
                    <td rowspan="3" style="vertical-align: top; background:#0a0a0a; padding:15px">
                        <div class="input-group"><label>GAIN</label><input id="gain" type="number" step="0.1"></div>
                        <div class="input-group" style="margin-top:10px"><label>AWB R/B</label>
                            <div style="display:flex; gap:5px"><input id="awb_r" step="0.01"><input id="awb_b" step="0.01"></div>
                        </div>
                        <div class="input-group" style="margin-top:10px"><label>FOV</label><input id="fov" type="number"></div>
                        <div class="input-group" style="margin-top:10px"><label>IMAGE</label><input id="image"></div>
                        <div class="input-group" style="margin-top:10px"><label>COMPRESSION</label>
                            <select id="tiff_compression"><option value="zip">ZIP</option><option value="none">RAW</option></select>
                        </div>
                    </td>
                </tr>
                <tr class="key-row-2">
                    <td style="color:#6f6">KEY 2</td>
                    <td><input id="f2" type="number"></td>
                    <td><input id="p2"></td>
                    <td><input id="r2"></td>
                    <td><input id="s2" type="number" step="0.1"></td>
                    <td><input id="sd2" type="number" step="0.1"></td>
                    <td><input id="ph2" type="number" step="0.1"></td>
                    <td><input type="color" id="c2_hex"></td>
                </tr>
                <tr class="key-row-3">
                    <td style="color:#66f">KEY 3</td>
                    <td><input id="f3" type="number" oninput="syncProbeRange()"></td>
                    <td><input id="p3"></td>
                    <td><input id="r3"></td>
                    <td><input id="s3" type="number" step="0.1"></td>
                    <td><input id="sd3" type="number" step="0.1"></td>
                    <td><input id="ph3" type="number" step="0.1"></td>
                    <td><input type="color" id="c3_hex"></td>
                </tr>
            </tbody>
        </table>
    </div>
    </fieldset>

    <script>
        let isFirstLoad = true;
        function hexToRgb(hex) { return [parseInt(hex.slice(1,3),16)/255, parseInt(hex.slice(3,5),16)/255, parseInt(hex.slice(5,7),16)/255]; }

        function syncProbeRange() {
            const start = document.getElementById('f1').value;
            const end = document.getElementById('f3').value;
            const probe = document.getElementById('probe_frame');
            probe.min = start; probe.max = end;
        }

        async function updateHUD() {
            const resp = await fetch('/status');
            const st = await resp.json();
            document.getElementById('st_msg').innerText = st.msg;
            document.getElementById('st_frame').innerText = `FRAME ${st.current} / ${st.total}`;
            document.getElementById('st_bar').style.width = (st.total > 0 ? (st.current/st.total*100) : 0) + "%";
            const min = Math.floor(st.eta / 60), sec = Math.floor(st.eta % 60);
            document.getElementById('st_eta').innerText = `${min}:${sec.toString().padStart(2, '0')}`;
            
            document.getElementById('main-fields').disabled = (st.status === 'running');
            document.getElementById('exec-btn').disabled = (st.status === 'running');

            if (isFirstLoad && st.params) {
                for (let k in st.params) { 
                    const el = document.getElementById(k); 
                    if(el) {
                        if(el.type === 'checkbox') el.checked = st.params[k];
                        else el.value = st.params[k];
                    }
                }
                syncProbeRange();
                isFirstLoad = false;
            }
            document.getElementById('val_frame').innerText = document.getElementById('probe_frame').value;
            document.getElementById('val_sub').innerText = Math.round(document.getElementById('probe_sub').value * 100);
        }

        async function panic() { if(confirm("ABORT RUN?")) fetch('/panic', {method:'POST'}); }
        async function nukeMag() { if(confirm("NUKE ALL LATENT IMAGES?")) fetch('/nuke_mag', {method:'POST'}); }
        
        setInterval(updateHUD, 1000);

        async function runTask(type) {
            const data = {};
            document.querySelectorAll('input, select').forEach(i => { 
                if(i.id) data[i.id] = (i.type === 'checkbox' ? i.checked : i.value); 
            });
            data.c_start = hexToRgb(document.getElementById('c1_hex').value); // Fallback for engine legacy logic
            data.c_end = hexToRgb(document.getElementById('c3_hex').value);
            fetch((type === 'preview' ? '/preview' : '/execute_sequence'), {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)
            });
        }
    </script>
</body>
</html>
