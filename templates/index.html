<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VOP Projector v0.3.3</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style> .color-row { display: flex; gap: 10px; align-items: center; margin-top: 5px; } </style>
</head>
<body>
    <div class="container">
        <h2>VOP v0.3.3 | CHROMATIC 3D SMEAR</h2><br>
        
        <div class="panel">
            <h3>LOGISTICS & OPTICS</h3>
            <div class="input-group"><label>FRAME #</label><input id="frame" type="number" value="1"></div>
            <div class="input-group"><label>SMEAR (SEC)</label><input id="smear" type="number" step="0.1" value="5.0"></div>
            <div class="input-group"><label>GAIN</label><input id="gain" type="number" value="1.0"></div>
            <div class="input-group">
                <label>AWB GAINS (R, B)</label>
                <div style="display:flex; gap: 5px;">
                    <input id="awb_r" value="3.18" style="width:50%">
                    <input id="awb_b" value="1.45" style="width:50%">
                </div>
            </div>
            <div class="input-group" style="grid-column: span 2;">
                <label>PROJECTION COLOR (START -> END)</label>
                <div class="color-row">
                    <input type="color" id="c_start_hex" value="#0000ff" style="width:100px; height:40px;">
                    <span style="font-size: 20px;">➔</span>
                    <input type="color" id="c_end_hex" value="#ffffff" style="width:100px; height:40px;">
                </div>
            </div>
        </div>

        <div class="panel">
            <h3>3D TRANSFORM</h3>
            <div class="input-group"><label>PROJ IMAGE</label><input id="image" value="vop_logo_mockup_400px.png"></div>
            <div class="input-group"><label>FOV</label><input id="fov" value="45.0"></div>
            <div class="input-group"><label>POS START</label><input id="p_start" value="0.0,0.0,-2.0"></div>
            <div class="input-group"><label>POS END</label><input id="p_end" value="0.0,0.0,-2.0"></div>
            <div class="input-group"><label>ROT START</label><input id="r_start" value="0.0,0.0,0.0"></div>
            <div class="input-group"><label>ROT END</label><input id="r_end" value="0.0,0.0,0.0"></div>
            <div class="preview-group">
                <button class="preview-btn" onclick="runTask('preview', 0.0)">START</button>
                <button class="preview-btn" onclick="runTask('preview', 0.5)">MID</button>
                <button class="preview-btn" onclick="runTask('preview', 1.0)">END</button>
            </div>
        </div>
        <button class="execute-btn" style="width:100%; margin-top:10px;" onclick="runTask('smear')">EXECUTE OPTICAL SMEAR</button>
    </div>

    <script>
        function hexToRgb(hex) {
            return [parseInt(hex.slice(1,3),16)/255, parseInt(hex.slice(3,5),16)/255, parseInt(hex.slice(5,7),16)/255];
        }

        async function runTask(type, pValue = 0.0) {
            const data = {
                frame:   document.getElementById('frame').value,
                image:   document.getElementById('image').value,
                smear:   document.getElementById('smear').value,
                gain:    document.getElementById('gain').value,
                awb_r:   document.getElementById('awb_r').value,
                awb_b:   document.getElementById('awb_b').value,
                fov:     document.getElementById('fov').value,
                p_start: document.getElementById('p_start').value,
                p_end:   document.getElementById('p_end').value,
                r_start: document.getElementById('r_start').value,
                r_end:   document.getElementById('r_end').value,
                c_start: hexToRgb(document.getElementById('c_start_hex').value),
                c_end:   hexToRgb(document.getElementById('c_end_hex').value),
                preview_p: pValue
            };
            const endpoint = (type === 'preview') ? '/preview' : '/execute_smear';
            const resp = await fetch(endpoint, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const res = await resp.json();
            if(type !== 'preview') alert(res.status + ": " + res.message);
        }
    </script>
</body>
</html>
