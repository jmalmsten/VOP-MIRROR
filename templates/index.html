<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VOP v0.4.24 - Safety Console</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .hud { background: #000; padding: 15px; border: 1px solid #444; margin-bottom: 20px; transition: all 0.5s; font-family: monospace; }
        .hud.running { border-color: #0cf; color: #0cf; box-shadow: 0 0 10px #0cf; }
        .hud.success { border-color: #0f0; color: #0f0; box-shadow: 0 0 10px #0f0; }
        .hud.error   { border-color: #f00; color: #f00; box-shadow: 0 0 10px #f00; }
        .progress-bar { height: 12px; background: #222; margin-top: 10px; border: 1px solid #333; }
        .progress-fill { height: 100%; width: 0%; transition: width 0.5s; background: currentColor; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .panel-row { display: flex; gap: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>VOP v0.4.24 | SAFETY CONSOLE</h2>
        
        <div class="hud idle" id="hud">
            <div>STATUS: <span id="st_msg">IDLE</span> | EST. REMAINING: <span id="st_time">00:00</span></div>
            <div>FRAME: <span id="st_frame">0 / 0</span></div>
            <div class="progress-bar"><div class="progress-fill" id="st_bar"></div></div>
        </div>

        <div class="panel">
            <h3>PRINTER CONSTANTS (GLOBAL)</h3>
            <div class="grid-3">
                <div class="input-group"><label>START MASTER</label><input id="f_start" type="number" value="1"></div>
                <div class="input-group"><label>END MASTER</label><input id="f_end" type="number" value="24"></div>
                <div class="input-group"><label>EXPORT FPS</label><input id="fps" type="number" value="24"></div>
                <div class="input-group"><label>SMEAR (SEC)</label><input id="smear" type="number" step="0.1" value="2.0"></div>
                <div class="input-group"><label>SHUTTER DISC</label><input id="shutter_disc" type="number" step="0.1" value="0.5"></div>
                <div class="input-group"><label>GAIN</label><input id="gain" type="number" step="0.1" value="1.0"></div>
                <div class="input-group"><label>PROJ IMAGE</label><input id="image" value="vop_logo_mockup_400px.png"></div>
                <div class="input-group"><label>FOV (LENS)</label><input id="fov" type="number" value="45"></div>
                <div class="input-group">
                    <label>AWB GAINS (R,B)</label>
                    <div style="display:flex; gap:5px;">
                        <input id="awb_r" value="3.18" style="width:50%"><input id="awb_b" value="1.45" style="width:50%">
                    </div>
                </div>
                <div class="input-group" style="grid-column: span 3; display: flex; align-items: center; gap: 10px;">
                    <label>WORKPRINT METADATA BURN-IN</label>
                    <input type="checkbox" id="burn_in" checked style="width:20px; height:20px;">
                </div>
            </div>
        </div>

        <div class="panel-row">
            <div class="panel" style="flex:1; border-left: 4px solid #f00;">
                <h3>START KEY</h3>
                <div class="input-group"><label>POSITION</label><input id="p_start" value="0.0,0.0,-5.0"></div>
                <div class="input-group"><label>ROTATION</label><input id="r_start" value="0.0,0.0,0.0"></div>
                <input type="color" id="c_start_hex" value="#ff0000" style="width:100%; height:40px;">
            </div>
            <div class="panel" style="flex:1; border-left: 4px solid #00f;">
                <h3>END KEY</h3>
                <div class="input-group"><label>POSITION</label><input id="p_end" value="0.0,0.0,-2.0"></div>
                <div class="input-group"><label>ROTATION</label><input id="r_end" value="0.0,0.0,0.0"></div>
                <input type="color" id="c_end_hex" value="#0000ff" style="width:100%; height:40px;">
            </div>
        </div>

        <div class="panel">
            <h3>RENDER CONTROL</h3>
            <div style="display: flex; gap: 10px;">
                <button class="preview-btn" style="flex:1" onclick="runTask('preview', 0.0)">START</button>
                <button class="preview-btn" style="flex:1" onclick="runTask('preview', 0.5)">MID</button>
                <button class="preview-btn" style="flex:1" onclick="runTask('preview', 1.0)">END</button>
            </div>
            <button class="execute-btn" style="width:100%; margin-top:15px; padding: 20px;" onclick="runTask('sequence')">EXECUTE OPTICAL SEQUENCE</button>
        </div>
    </div>

    <script>
        function hexToRgb(hex) {
            return [parseInt(hex.slice(1,3),16)/255, parseInt(hex.slice(3,5),16)/255, parseInt(hex.slice(5,7),16)/255];
        }

        setInterval(async () => {
            const resp = await fetch('/status');
            const st = await resp.json();
            const hud = document.getElementById('hud');
            
            hud.className = 'hud ' + st.status;
            document.getElementById('st_msg').innerText = st.msg;
            document.getElementById('st_frame').innerText = `${st.current} / ${st.total}`;
            
            if(st.total > 0 && st.current > 0) {
                const perc = (st.current / st.total) * 100;
                document.getElementById('st_bar').style.width = perc + "%";
                const elapsed = (Date.now() / 1000) - st.start_time;
                const remaining = Math.round((elapsed / st.current) * (st.total - st.current));
                document.getElementById('st_time').innerText = `${Math.floor(remaining/60)}:${(remaining%60).toString().padStart(2,'0')}`;
            }
        }, 1000);

        async function runTask(type, pValue = 0.0) {
            const data = {
                f_start: document.getElementById('f_start').value,
                f_end:   document.getElementById('f_end').value,
                shutter_disc: document.getElementById('shutter_disc').value,
                fps:     document.getElementById('fps').value,
                burn_in: document.getElementById('burn_in').checked,
                image:   document.getElementById('image').value,
                smear:   document.getElementById('smear').value,
                gain:    document.getElementById('gain').value,
                fov:     document.getElementById('fov').value,
                awb_r:   document.getElementById('awb_r').value,
                awb_b:   document.getElementById('awb_b').value,
                p_start: document.getElementById('p_start').value, 
                p_end:   document.getElementById('p_end').value,
                r_start: document.getElementById('r_start').value, 
                r_end:   document.getElementById('r_end').value,
                c_start: hexToRgb(document.getElementById('c_start_hex').value),
                c_end:   hexToRgb(document.getElementById('c_end_hex').value),
                preview_p: pValue
            };
            const endpoint = (type === 'preview') ? '/preview' : '/execute_sequence';
            await fetch(endpoint, {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)
            });
        }
    </script>
</body>
</html>
