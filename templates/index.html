<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOP v0.7.3 - Virtual Optical Printer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { background: #0b0b0b; color: #ddd; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .vop-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        
        /* Logical Grouping for Settings */
        .settings-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-bottom: 25px; }
        .group-box { background: #151515; padding: 15px; border-radius: 4px; border: 1px solid #222; }
        .group-title { font-size: 0.7em; color: #555; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .input-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(70px, 1fr)); gap: 10px; }
        
        .c-box { display: flex; flex-direction: column; }
        .c-box label { font-size: 0.65em; color: #888; margin-bottom: 4px; }
        .c-box input, .c-box select { background: #222; border: 1px solid #444; color: #0cf; padding: 4px; border-radius: 3px; font-size: 0.85em; }

        .sheet-container { background: #111; padding: 20px; border-radius: 4px; border: 1px solid #222; }
        hr { border: 0; border-top: 1px solid #333; margin: 25px 0; }
    </style>
</head>
<body>
    <div class="container">
        <header class="vop-header">
            <h1>VOP <small style="color:#555">v0.7.3</small></h1>
            <div id="sync_indicator" style="color:#0f0; font-size:0.8em; font-family: monospace;">● SYNCED</div>
        </header>

        <section id="top-status">
            {% include 'sections/status.html' %}
        </section>

        <section class="probe-area">
            {% include 'sections/probe.html' %}
        </section>

        <hr>

        <div class="settings-grid">
            <div class="group-box">
                <div class="group-title">Hardware & Global Settings</div>
                <div class="input-row">
                    <div class="c-box"><label>FOV</label><input id="fov" type="number" step="0.1"></div>
                    <div class="c-box"><label>FPS</label><input id="fps" type="number"></div>
                    <div class="c-box"><label>GAIN</label><input id="gain" type="number" step="0.1"></div>
                    <div class="c-box"><label>AWB R</label><input id="awb_r" type="number" step="0.01"></div>
                    <div class="c-box"><label>AWB B</label><input id="awb_b" type="number" step="0.01"></div>
                </div>
                <div class="c-box" style="margin-top:10px;">
                    <label>PROJ IMAGE PATH</label><input id="image" type="text">
                </div>
            </div>

            <div class="group-box">
                <div class="group-title">Interpolation Modes</div>
                <div class="input-row">
                    <div class="c-box"><label>POS</label>
                        <select id="p_mode"><option value="smooth">Smooth</option><option value="linear">Linear</option></select>
                    </div>
                    <div class="c-box"><label>ROT</label>
                        <select id="r_mode"><option value="smooth">Smooth</option><option value="linear">Linear</option></select>
                    </div>
                    <div class="c-box"><label>CLR</label>
                        <select id="c_mode"><option value="smooth">Smooth</option><option value="linear">Linear</option></select>
                    </div>
                </div>
                <div class="c-box" style="margin-top:10px;">
                    <label>TIFF COMPRESSION</label>
                    <select id="tiff_compression">
                        <option value="none">None</option>
                        <option value="zip">ZIP (Deflate)</option>
                    </select>
                </div>
            </div>
        </div>

        <section class="sheet-container">
            <h2 style="margin-top:0; font-size: 1.1em; color: #555;">EXPOSURE SHEET</h2>
            {% include 'sections/sheet.html' %}
        </section>
    </div>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
