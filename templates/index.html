<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VOP v0.4.38 - head-less appliance</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .hud { background: #000; padding: 20px; border: 2px solid #333; margin-bottom: 20px; position: sticky; top: 0; z-index: 100; font-family: monospace; }
        .hud.running { border-color: #0cf; color: #0cf; }
        .hud.success { border-color: #0f0; color: #0f0; }
        .hud.error { border-color: #f00; color: #f00; }
        .progress-bar { height: 10px; background: #222; margin-top: 10px; }
        .progress-fill { height: 100%; width: 0%; background: currentColor; transition: width 0.5s; }
        .panic-btn { background: #f00; color: #fff; border: none; padding: 20px; font-weight: bold; width: 100%; display: none; margin-top: 10px; cursor: pointer; }
        .nuke-btn { background: #400; color: #f99; border: 1px solid #600; padding: 5px 15px; cursor: pointer; border-radius: 4px; }
        fieldset { border: none; padding: 0; margin: 0; }
        fieldset[disabled] { opacity: 0.5; pointer-events: none; filter: grayscale(1); }
        .panel { background: #111; padding: 15px; border: 1px solid #222; margin-bottom: 15px; }
        .probe-sliders { display: flex; flex-direction: column; gap: 20px; padding: 20px 0; }
        .slider-row { display: flex; align-items: center; gap: 25px; }
        input[type=range] { flex-grow: 1; height: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="hud idle" id="hud">
            <div style="display: flex; justify-content: space-between;">
                <span>STATUS: <b id="st_msg">IDLE</b></span>
                <span>ETA: <b id="st_eta">00:00</b></span>
            </div>
            <div id="st_frame" style="margin-top:5px">FRAME 0 / 0</div>
            <div class="progress-bar"><div class="progress-fill" id="st_bar"></div></div>
            <button class="panic-btn" id="panic-btn" onclick="panic()">PANIC: ABORT SEQUENCE</button>
        </div>

        <fieldset id="main-fields">
            <div class="panel">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3>PRINTER CONSTANTS</h3>
                    <button class="nuke-btn" onclick="nukeMag()">NUKE CamMag</button>
                </div>
                <div class="grid-3">
                    <div class="input-group"><label>SHUTTER DISC</label><input id="shutter_disc" type="number" step="0.1"></div>
                    <div class="input-group"><label>GAIN</label><input id="gain" type="number" step="0.1"></div>
                    <div class="input-group"><label>FOV (LENS)</label><input id="fov" type="number"></div>
                    <div class="input-group"><label>AWB GAIN R</label><input id="awb_r" type="number" step="0.01"></div>
                    <div class="input-group"><label>AWB GAIN B</label><input id="awb_b" type="number" step="0.01"></div>
                    <div class="input-group"><label>STORAGE</label>
                        <select id="tiff_compression"><option value="zip">ZIP</option><option value="none">RAW</option></select>
                    </div>
                </div>
            </div>

            <div class="panel">
                <h3>PROJECTOR SOURCE</h3>
                <div class="input-group"><label>PROJ IMAGE</label><input id="image" style="width:100%"></div>
            </div>

            <div class="panel-row">
                <div class="panel" style="flex:1; border-left: 4px solid #f00;">
                    <h3>START KEY</h3>
                    <div class="input-group"><label>MASTER FR</label><input id="f_start" type="number" oninput="syncProbeRange()"></div>
                    <div class="input-group"><label>POSITION</label><input id="p_start"></div>
                    <div class="input-group"><label>ROTATION</label><input id="r_start"></div>
                    <div class="input-group"><label>SMEAR (S)</label><input id="s_start" type="number" step="0.1"></div>
                    <div class="input-group"><label>PHASE</label><input id="ph_start" type="number" step="0.1"></div>
                    <label>FILTER COLOR</label>
                    <input type="color" id="c_start_hex" style="width:100%; height:40px; margin-top:5px; background:none; border:1px solid #333;">
                </div>
                <div class="panel" style="flex:1; border-left: 4px solid #00f;">
                    <h3>END KEY</h3>
                    <div class="input-group"><label>MASTER FR</label><input id="f_end" type="number" oninput="syncProbeRange()"></div>
                    <div class="input-group"><label>POSITION</label><input id="p_end"></div>
                    <div class="input-group"><label>ROTATION</label><input id="r_end"></div>
                    <div class="input-group"><label>SMEAR (S)</label><input id="s_end" type="number" step="0.1"></div>
                    <div class="input-group"><label>PHASE</label><input id="ph_end" type="number" step="0.1"></div>
                    <label>FILTER COLOR</label>
                    <input type="color" id="c_end_hex" style="width:100%; height:40px; margin-top:5px; background:none; border:1px solid #333;">
                </div>
            </div>
        </fieldset>

        <div class="panel">
            <h3>SUBFRAME PROBE</h3>
            <div class="probe-sliders">
                <div class="slider-row">
                    <label style="min-width:140px;">MASTER FR: <span id="val_frame">1</span></label>
                    <input type="range" id="probe_frame">
                </div>
                <div class="slider-row">
                    <label style="min-width:140px;">SMEAR POINT: <span id="val_sub">50</span>%</label>
                    <input type="range" id="probe_sub" min="0" max="1" step="0.01">
                </div>
            </div>
            <button class="preview-btn" style="width:100%; padding: 20px; font-weight: bold;" onclick="runTask('preview')">PROBE SUBFRAME POSITION</button>
        </div>

        <button class="execute-btn" style="width:100%; padding:25px; font-size:1.2em; margin-bottom: 40px;" id="exec-btn" onclick="runTask('sequence')">EXECUTE OPTICAL SEQUENCE</button>
    </div>

    <script>
        let isFirstLoad = true;
        function hexToRgb(hex) { return [parseInt(hex.slice(1,3),16)/255, parseInt(hex.slice(3,5),16)/255, parseInt(hex.slice(5,7),16)/255]; }

        function syncProbeRange() {
            const start = document.getElementById('f_start').value;
            const end = document.getElementById('f_end').value;
            const probe = document.getElementById('probe_frame');
            probe.min = start;
            probe.max = end;
        }

        async function updateHUD() {
            const resp = await fetch('/status');
            const st = await resp.json();
            document.getElementById('hud').className = 'hud ' + st.status;
            document.getElementById('st_msg').innerText = st.msg;
            document.getElementById('st_frame').innerText = `FRAME ${st.current} / ${st.total}`;
            document.getElementById('st_bar').style.width = (st.current/st.total*100) + "%";
            const min = Math.floor(st.eta / 60), sec = Math.floor(st.eta % 60);
            document.getElementById('st_eta').innerText = `${min}:${sec.toString().padStart(2, '0')}`;
            document.getElementById('panic-btn').style.display = (st.status === 'running') ? 'block' : 'none';
            document.getElementById('main-fields').disabled = (st.status === 'running');
            document.getElementById('exec-btn').disabled = (st.status === 'running');

            if (isFirstLoad && st.params) {
                for (let k in st.params) { const el = document.getElementById(k); if(el) el.value = st.params[k]; }
                syncProbeRange();
                isFirstLoad = false;
            }
            document.getElementById('val_frame').innerText = document.getElementById('probe_frame').value;
            document.getElementById('val_sub').innerText = Math.round(document.getElementById('probe_sub').value * 100);
        }

        async function panic() { if(confirm("STOP SEQUENCE?")) fetch('/panic', {method:'POST'}); }
        async function nukeMag() { if(confirm("NUKE ALL LATENT IMAGES?")) { 
            const r = await fetch('/nuke_mag', {method:'POST'}); const d = await r.json(); alert(`CLEARED ${d.count} FILES.`); 
        }}

        setInterval(updateHUD, 1000);

        async function runTask(type) {
            const data = {
                f_start: document.getElementById('f_start').value, f_end: document.getElementById('f_end').value,
                shutter_disc: document.getElementById('shutter_disc').value, tiff_compression: document.getElementById('tiff_compression').value,
                gain: document.getElementById('gain').value, fov: document.getElementById('fov').value,
                awb_r: document.getElementById('awb_r').value, awb_b: document.getElementById('awb_b').value,
                p_start: document.getElementById('p_start').value, p_end: document.getElementById('p_end').value,
                r_start: document.getElementById('r_start').value, r_end: document.getElementById('r_end').value,
                s_start: document.getElementById('s_start').value, s_end: document.getElementById('s_end').value,
                ph_start: document.getElementById('ph_start').value, ph_end: document.getElementById('ph_end').value,
                c_start: hexToRgb(document.getElementById('c_start_hex').value),
                c_end: hexToRgb(document.getElementById('c_end_hex').value),
                c_start_hex: document.getElementById('c_start_hex').value,
                c_end_hex: document.getElementById('c_end_hex').value,
                image: document.getElementById('image').value, version: "0.4.38",
                probe_frame: document.getElementById('probe_frame').value, probe_sub: document.getElementById('probe_sub').value
            };
            fetch((type === 'preview' ? '/preview' : '/execute_sequence'), {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)
            });
        }
    </script>
</body>
</html>
