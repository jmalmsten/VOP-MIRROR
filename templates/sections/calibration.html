Calibration page.

Hosts the Peak White calibration controls for BRK mode.

The noise crusher and hot-pixel (defect) mapper were migrated here from
the Main page's Hardware Constants box - both are sensor-level, once-per-
setup calibrations rather than per-job settings.

Future calibrations will live here too: white-balance card calibration,
full LUT calibration, flat-field/uneven-screen mapping, and migration of
the remaining framing tools currently on the Main page.

Layout: 2-column grid inherited from .page-section.page-active.
  Left column  = preview window (showing the most recent capture)
  Right column = measurement controls + current calibration readout

All styling lives in static/style.css per project convention.
No JS event handlers here - those are wired up by slice 7 in main.js.
-->

<!-- LEFT COLUMN: preview window. Now a STACK so the live framing feed
     (issue #198) and the still capture can occupy the same box, with a
     future alignment overlay layered on top (Slice 3). Only one of the
     two images is visible at a time:
       - cal_probe_img : still from the last measurement (default)
       - cal_feed_img  : live MJPEG feed, shown while framing is active
     The .feed-active class on the stack flips which one shows; CSS
     handles the visibility so the HTML stays logic-free. -->
<div class="preview-area cal-preview-area">
    <div class="cal-preview-stack" id="cal_preview_stack">
        <img id="cal_probe_img" alt="Calibration Capture Preview">
        <img id="cal_feed_img" alt="Live Framing Feed">
        <!-- Aspect-aware framing overlay (issue #198, Slice 3).
             preserveAspectRatio="xMidYMid meet" letterboxes the viewBox the
             SAME way the feed <img>'s object-fit:contain does, so boxes drawn
             in viewBox units (sensor pixels) line up with the camera image at
             any window size - no JS resize math. main.js sets the real viewBox
             (from the sensor dims) and positions the corner boxes from the
             panel aspect. Placed last in the stack so it layers on top. -->
        <svg id="cal_feed_overlay" class="cal-feed-overlay"
             viewBox="0 0 2028 1520" preserveAspectRatio="xMidYMid meet"
             aria-hidden="true"></svg>
    </div>
</div>

<!-- RIGHT COLUMN: measurement controls + readout. -->
<div class="cal-controls-area">
    <!-- Framing & Focus (issue #198).
         Starts/stops the live camera feed shown in the left preview box,
         for setting physical camera XYZ / PTR / zoom / focus between jobs.
         The feed holds the sensor, so starting it is refused while a job
         is running, and it auto-stops when a measurement starts or when
         the user leaves this page (wired in main.js). On-screen alignment
         targets and the corner-box overlay arrive in later slices. -->
    <div class="group-box">
        <div class="group-title">Framing &amp; Focus</div>

        <div class="cal-status-row">
            <span class="cal-status-label">Feed:</span>
            <span id="cal_feed_status" class="cal-status-text">Stopped</span>
        </div>

        <div class="input-row spaced">
            <button type="button" class="action-btn" id="cal_feed_start_btn"
                    title="Start the live camera feed in the preview window for framing and focus.">START FEED</button>
            <button type="button" class="action-btn danger" id="cal_feed_stop_btn"
                    title="Stop the live feed and release the camera.">STOP FEED</button>
        </div>

        <!-- 1:1 focus zoom toggle (Slice 4). Label flips between 1:1 FOCUS
             and FIT VIEW in main.js. Only does anything while the feed is
             live (it needs an image to zoom into). -->
        <div class="input-row spaced">
            <button type="button" class="action-btn" id="cal_feed_zoom_btn"
                    title="Toggle 1:1 native-pixel zoom for judging focus. Click and drag to pan around the sensor; click again to return to the full framing view.">1:1 FOCUS</button>
        </div>
    </div>

    <!-- Peak White section. The main calibration routine: find the
         exposure time at which the projection monitor's max white
         lands at the user's target brightness range. -->
    <div class="group-box">
        <div class="group-title">Peak White</div>

        <!-- Status indicator. Simple "Ready" / "Measuring" text.
             Slice 7 updates this based on /status polling. -->
        <div class="cal-status-row">
            <span class="cal-status-label">Status:</span>
            <span id="cal_status_text" class="cal-status-text">Ready</span>
        </div>

        <!-- Exposure Time field.
             Editable for manual override. The ACB button writes its
             converged result here; the Single Measurement button uses
             whatever value is here as its exposure. -->
        <div class="input-row spaced">
            <div class="c-box">
                <label>Exposure Time (s)</label>
                <input type="number" id="cal_exposure_s" step="0.001" value="1.0"
                       title="Exposure time in seconds. ACB writes its converged T_peak here on success. Single Measurement uses this value directly.">
            </div>
        </div>

        <!-- Single Measurement row.
             Button + colour-coded brightness readout. Pairs naturally
             with the Exposure Time field above - they're the manual
             counterpart to the ACB automation below. -->
        <div class="input-row spaced">
            <button type="button" class="mini-btn" id="cal_single_btn"
                    title="Capture once at the exposure time above. Result shown to the right.">SINGLE MEASUREMENT</button>
            <span id="cal_single_result" class="cal-readout">--</span>
        </div>

        <hr class="section-divider">

        <!-- ACB controls.
             Auto-converge T_peak via bisection-with-doubling-bootstrap.
             The four parameters control the search bounds and the
             convergence target. -->
        <div class="constants-zone cal-acb-params">
            <div class="const-group">
                <label>Initial Exposure (s)</label>
                <input type="number" id="cal_acb_initial" step="0.001" value="1.0"
                       title="Starting exposure for the ACB search. ACB will double/halve from here until bracketed.">
            </div>
            <div class="const-group">
                <label>Target Low</label>
                <input type="number" id="cal_acb_target_low" step="0.01" value="0.94"
                       title="Minimum mean brightness for convergence. Lower values = darker T_peak.">
            </div>
            <div class="const-group">
                <label>Target High</label>
                <input type="number" id="cal_acb_target_high" step="0.01" value="0.98"
                       title="Maximum mean brightness for convergence. Higher values = brighter T_peak (closer to clipping).">
            </div>
            <div class="const-group">
                <label>Max Iterations</label>
                <input type="number" id="cal_acb_max_iter" step="1" value="10"
                       title="Safety cap on the ACB search loop. 10 is plenty in practice.">
            </div>
        </div>

        <!-- ACB trigger + black-floor checkbox.
             The checkbox is opt-in: enabling it makes ACB run one
             extra capture at T_peak with a black target after
             convergence, persisting the noise floor to calibration.json
             under black_floor_at_t_peak. Slice 7 handles the
             two-step sequencing. -->
        <div class="input-row spaced cal-acb-trigger-row">
            <button type="button" class="action-btn" id="cal_acb_btn"
                    title="Auto Calibrate for Brackets. Runs ACB and persists T_peak on convergence.">ACB</button>
            <label class="cal-black-checkbox" title="After ACB converges, run one additional capture at T_peak with a black target. Stores the noise floor as black_floor_at_t_peak in calibration.json.">
                <input type="checkbox" id="cal_include_black" checked>
                Include black level measurement
            </label>
        </div>
    </div>

    <!-- Current calibration state readout.
         Pulled from /calibration_state and refreshed by slice 7's
         JS after each measurement. This is where the user sees
         "what's the current T_peak the engine will use for BRK?". -->
    <div class="group-box">
        <div class="group-title">Current Calibration</div>   
        <div class="cal-readout-grid">
            <div class="cal-readout-label">T_peak (s):</div>
            <div class="cal-readout-value" id="cal_readout_t_peak">--</div>

            <div class="cal-readout-label">Black floor:</div>
            <div class="cal-readout-value" id="cal_readout_black_floor">--</div>

            <div class="cal-readout-label">Last measured at WB:</div>
            <div class="cal-readout-value" id="cal_readout_wb">--</div>

            <div class="cal-readout-label">Converged:</div>
            <div class="cal-readout-value" id="cal_readout_converged">--</div>
        </div>
    </div>

    <!-- Auto White Balance section.
         Semi-auto: derives camera WB gains (awb_r / awb_b) once from a
         neutral grey field via a closed loop on --awbgains, then jobs
         reuse them so WB never drifts between frames. Captures bypass the 
         timeline (ctx.clear), so no PG/CG is applied during measurement.
    -->
    <div class="group-box">
        <div class="group-title">Auto White Balance</div>

        <div class="cal-status-row">
            <span class="cal-status-label">Status:</span>
            <span id="cal_wb_status_text" class="cal-status-text">Ready</span>
        </div>

        <!-- Search parameters. Grey level + the safe mid-tone window the
             exposure aims the brightest channel into
        -->
        <div class="constants-zone cal-wb-params">
            <div class="const-group">
                <label>Grey Level</label>
                <input type="number" id="cal_wb_grey" step="0.01" min="0" max="1" value="0.5"
                       title="Framebuffer grey shown during WB measurement. 0.5 is a safe mid-tone. Neutrality matters, not the exact level.">
            </div>
            <div class="const-group">
                <label>Initial Exposure (s)</label>
                <input type="number" id="cal_wb_initial" step="0.001" value="1.0"
                       title="Starting exposure for the WB exposure search.">
            </div>
            <div class="const-group">
                <label>Expo Target Low</label>
                <input type="number" id="cal_wb_expo_low" step="0.01" value="0.45"
                       title="Lower bound for the brightest channel. Keeps the grey above the noise floor.">
            </div>
            <div class="const-group">
                <label>Expo Target High</label>
                <input type="number" id="cal_wb_expo_high" step="0.01" value="0.70"
                       title="Upper bound for the brightest channel. keeps every channel clear of clipping.">
            </div>
        </div>

        <div class="input-row spaced cal-wb-trigger-row">
            <button type="button" class="action-btn" id="cal_wb_btn"
                    title="Find camera WB gains from a neutral grey, then confirm Persists awb_r / awb_b and writes them to the main page.">AUTO WHITE BALANCE</button>
        </div>

        <!-- Result readout. These are the camera gains the loop converged on,
             plus the confirmed residual (the accountant's truth check).
        -->
        <div class="cal-readout-grid">
            <div class="cal-readout-label">awb_r:</div>
            <div class="cal-readout-value" id="cal_wb_readout_r">--</div>

            <div class="cal-readout-label">awb_b:</div>
            <div class="cal-readout-value" id="cal_wb_readout_b">--</div>

            <div class="cal-readout-label">Accountant's truth:</div>
            <div class="cal-readout-value" id="cal_wb_readout_pass">--</div>
        </div>
    </div>

    <!-- Noise floor & defect mapping.
         Migrated here from the Main page's Hardware Constants box. Both
         are sensor-level calibrations done once per setup rather than
         per-job settings, so they belong with the other calibration
         routines on this page instead of crowding the Main constants grid.

         Noise Crusher: MEASURE captures the sensor's black floor into the
         readout; clicking the readout copies that value into the black_clip
         field, which the engine subtracts as a noise floor on every frame.
         Defect Mapping: MAP PIXELS builds a hot-pixel map from a dark frame;
         NUKE MAP clears it.

         IDs are unchanged from the Main page, so the existing handlers in
         main.js (triggerMeasurement / triggerHotPixelMap / nukeHotPixels)
         and the click-to-apply wiring keep working with no JS changes. The
         rows reuse .const-group.crush-group; outside a grid its
         grid-column:span 2 is a no-op and the two rows simply stack. -->
    <div class="group-box">
        <div class="group-title">Noise Floor &amp; Defect Mapping</div>

        <div class="const-group crush-group">
            <label>Noise Crusher</label>
            <input type="number" step="0.0001" id="black_clip" value="0.0">
            <button class="mini-btn measure_noise" onclick="triggerMeasurement()">MEASURE</button>
            <span id="noise_result_txt"></span>
            <span id="black_clip_warning" class="validation-warning"></span>
        </div>
        <hr class="section-divider">
        <div class="const-group crush-group">
            <label>Defect Mapping</label>
            <button class="mini-btn" onclick="triggerHotPixelMap()">MAP PIXELS</button>
            <button class="mini-btn danger" onclick="nukeHotPixels()">NUKE MAP</button>
            <span id="hp_result_txt"></span>
        </div>
    </div>

</div>
