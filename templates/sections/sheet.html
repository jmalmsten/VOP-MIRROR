<style>
    .vop-sheet { width: 100%; border-collapse: collapse; }
    .sheet-row { display: grid; grid-template-columns: 30px 110px 140px 140px 70px 70px 60px 60px 60px; gap: 12px; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; }
    .header { font-size: 0.6em; color: #444; font-weight: bold; text-transform: uppercase; border-bottom: 2px solid #333; }
    .sheet-row input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 4px; width: 100%; border-radius: 2px; font-family: monospace; font-size: 0.85em; }
    .snap-btn { background: #222; color: #0cf; padding: 2px 8px; font-size: 0.7em; border: 1px solid #444; border-radius: 3px; cursor: pointer; }
    .snap-btn:hover { background: #0cf; color: #000; }
    .k-fr { display: flex; gap: 4px; align-items: center; }
</style>

<div class="vop-sheet">
    <div class="sheet-row header">
        <div>#</div><div>FRAME</div><div>POS (X,Y,Z)</div><div>ROT (P,R,Y)</div><div>PROJ GEL</div><div>CAM GEL</div><div>EXP</div><div>SD</div><div>PH</div>
    </div>

    {% for i in range(1, 4) %}
    <div class="sheet-row">
        <div style="color:#333; font-weight: bold;">{{ i }}</div>
        <div class="k-fr">
            <input id="f{{ i }}" type="number" {% if i != 2 %}onchange="updateProbeRange()"{% endif %}>
            <button class="snap-btn" onclick="jumpToFrame('f{{ i }}')">GO</button>
        </div>
        <div><input id="p{{ i }}" type="text" placeholder="X,Y,Z"></div>
        <div><input id="r{{ i }}" type="text" placeholder="P,R,Y"></div>
        <div><input id="c{{ i }}_hex" type="color" title="ProjGel"></div>
        <div><input id="cg{{ i }}_hex" type="color" value="#ffffff" title="CamGel"></div>
        <div><input id="s{{ i }}" type="number" step="0.1" value="1.0"></div>
        <div><input id="sd{{ i }}" type="number" step="0.1" value="1.0"></div>
        <div><input id="ph{{ i }}" type="number" step="0.1" value="0.5"></div>
    </div>
    {% endfor %}
</div>
