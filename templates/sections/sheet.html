<style>
    .vop-sheet { width: 100%; border-collapse: collapse; }
    .sheet-row { display: grid; grid-template-columns: 30px 110px 160px 160px 70px 70px 70px 70px; gap: 15px; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; }
    .header { font-size: 0.65em; color: #444; font-weight: bold; text-transform: uppercase; border-bottom: 2px solid #333; }
    .sheet-row input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 5px; width: 100%; border-radius: 2px; font-family: monospace; font-size: 0.9em; }
    .snap-btn { background: #222; color: #0cf; padding: 2px 8px; font-size: 0.7em; border: 1px solid #444; border-radius: 3px; cursor: pointer; }
    .snap-btn:hover { background: #0cf; color: #000; }
    .k-fr { display: flex; gap: 6px; align-items: center; }
</style>

<div class="vop-sheet">
    <div class="sheet-row header">
        <div>#</div><div>FRAME</div><div>POS (X,Y,Z)</div><div>ROT (P,R,Y)</div><div>COLOR</div><div>SMR</div><div>SD</div><div>PH</div>
    </div>

    <div class="sheet-row">
        <div style="color:#333; font-weight: bold;">1</div>
        <div class="k-fr"><input id="f1" type="number" onchange="updateProbeRange()"><button class="snap-btn" onclick="jumpToFrame('f1')">GO</button></div>
        <div><input id="p1" type="text"></div>
        <div><input id="r1" type="text"></div>
        <div><input id="c1_hex" type="color"></div>
        <div><input id="s1" type="number" step="0.1"></div>
        <div><input id="sd1" type="number" step="0.1"></div>
        <div><input id="ph1" type="number" step="0.1"></div>
    </div>

    <div class="sheet-row">
        <div style="color:#333; font-weight: bold;">2</div>
        <div class="k-fr"><input id="f2" type="number"><button class="snap-btn" onclick="jumpToFrame('f2')">GO</button></div>
        <div><input id="p2" type="text"></div>
        <div><input id="r2" type="text"></div>
        <div><input id="c2_hex" type="color"></div>
        <div><input id="s2" type="number" step="0.1"></div>
        <div><input id="sd2" type="number" step="0.1"></div>
        <div><input id="ph2" type="number" step="0.1"></div>
    </div>

    <div class="sheet-row">
        <div style="color:#333; font-weight: bold;">3</div>
        <div class="k-fr"><input id="f3" type="number" onchange="updateProbeRange()"><button class="snap-btn" onclick="jumpToFrame('f3')">GO</button></div>
        <div><input id="p3" type="text"></div>
        <div><input id="r3" type="text"></div>
        <div><input id="c3_hex" type="color"></div>
        <div><input id="s3" type="number" step="0.1"></div>
        <div><input id="sd3" type="number" step="0.1"></div>
        <div><input id="ph3" type="number" step="0.1"></div>
    </div>
</div>
