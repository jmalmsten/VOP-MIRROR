<fieldset id="main-fields">
    <table>
        <thead>
            <tr>
                <th>KEY</th><th>FR</th>
                <th>POS <select id="p_mode"><option value="linear">LIN</option><option value="smooth">SMO</option></select></th>
                <th>ROT <select id="r_mode"><option value="linear">LIN</option><option value="smooth">SMO</option></select></th>
                <th>EXPOSURE (S)</th><th>SHUTTER</th><th>PHASE</th><th>COLOR</th>
            </tr>
        </thead>
        <tbody>
            <tr class="key-row-1">
                <td>KEY 1</td><td><input id="f1" type="number" oninput="updateProbeRange()"></td>
                <td><input id="p1"></td><td><input id="r1"></td>
                <td><input id="s1" type="number" step="0.1"></td><td><input id="sd1" step="0.1"></td><td><input id="ph1" step="0.1"></td>
                <td><input type="color" id="c1_hex"></td>
            </tr>
            <tr class="key-row-2">
                <td>KEY 2</td><td><input id="f2" type="number" oninput="updateProbeRange()"></td>
                <td><input id="p2"></td><td><input id="r2"></td>
                <td><input id="s2" type="number" step="0.1"></td><td><input id="sd2" step="0.1"></td><td><input id="ph2" step="0.1"></td>
                <td><input type="color" id="c2_hex"></td>
            </tr>
            <tr class="key-row-3">
                <td>KEY 3</td><td><input id="f3" type="number" oninput="updateProbeRange()"></td>
                <td><input id="p3"></td><td><input id="r3"></td>
                <td><input id="s3" type="number" step="0.1"></td><td><input id="sd3" step="0.1"></td><td><input id="ph3" step="0.1"></td>
                <td><input type="color" id="c3_hex"></td>
            </tr>
        </tbody>
    </table>
</fieldset>
