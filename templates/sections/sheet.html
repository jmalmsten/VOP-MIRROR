<style>
    .vop-sheet { width: 100%; border-collapse: collapse; }
    /* Grid adjusted for CRN column */
    .sheet-row { display: grid; grid-template-columns: 30px 90px 45px 30px 140px 140px 70px 70px 50px 50px 50px 30px; gap: 8px; align-items: center; padding: 6px 0; border-bottom: 1px solid #222; }
    .header { font-size: 0.6em; color: #444; font-weight: bold; text-transform: uppercase; border-bottom: 2px solid #333; }
    .sheet-row input[type="text"], .sheet-row input[type="number"], .sheet-row select { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 4px; width: 100%; border-radius: 2px; font-family: monospace; font-size: 0.85em; }
    .sheet-row input[type="checkbox"] { width: auto; }
    .snap-btn { background: #222; color: #0cf; padding: 2px 6px; font-size: 0.7em; border: 1px solid #444; border-radius: 3px; cursor: pointer; }
    .snap-btn:hover { background: #0cf; color: #000; }
    .del-btn { background: #300; color: #f44; border: 1px solid #500; border-radius: 3px; cursor: pointer; font-weight: bold; padding: 0 6px; }
    .del-btn:hover { background: #f00; color: #fff; }
    .k-fr { display: flex; gap: 4px; align-items: center; }
    .add-row { margin-top: 15px; text-align: center; }
    .add-btn { background: #111; border: 1px solid #333; color: #666; width: 100%; padding: 8px; cursor: pointer; text-transform: uppercase; font-size: 0.8em; letter-spacing: 1px; }
    .add-btn:hover { background: #222; color: #fff; border-color: #555; }
</style>

<div class="vop-sheet" id="sheet_container">
    <div class="sheet-row header">
        <div>#</div><div>FRAME</div><div>INT</div><div>CRN</div><div>POS (X,Y,Z)</div><div>ROT (P,R,Y)</div><div>PROJ GEL</div><div>CAM GEL</div><div>EXP</div><div>SD</div><div>PH</div><div></div>
    </div>
    </div>

<div class="add-row">
    <button class="add-btn" onclick="addKeyframe()">+ Add Keyframe</button>
</div>
