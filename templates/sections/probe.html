    <div class="probe-controls">
        <div class="control-group">
            <label>MASTER FR</label>

            <span id="val_probe_frame" class="val-label">1</span>
        </div>
        <div class="control-group">
            <label>SMEAR PT</label>
            <input type="range" id="probe_sub" min="0" max="1" step="0.01" value="0.5" class="wide-slider" oninput="runTask('preview')">

        </div>
        <button onclick="runTask('preview')" class="gen-btn">GENERATE PROBE CAPTURE</button>
    </div>

    <div class="probe-view">
        <img id="probe_img" src="/static/probe_live.jpg" alt="Probe Preview">
    </div>
</div>
