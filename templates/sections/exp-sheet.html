<div class="vop-sheet">
    <div class="sheet-row sheet-header">
        <div>#</div>
        <div title="Frame Number">FR</div>
        <div title="Interpolation Mode">INT</div>
        <div title="Corner/Sharp Turn">C</div>
        <div title="Source Anchor (-1 Auto)">SRC</div>
        <div title="Source Step">STP</div>
        <div title="Position (X,Y,Z)">POS</div>
        <div title="Rotation (P,R,Y)">ROT</div>
        <div title="Projector Gel">PG</div>
        <div title="Camera Gel">CG</div>
        <div title="Exposure Time (Sec)">EXP</div>
        <div title="Smear Distance (Frames)">SD</div>
        <div title="Shutter Phase (0.0-1.0)">PH</div>
        <div></div>
    </div>
    
    <div id="sheet_body"></div>
</div>

<div class="add-row">
    <button class="add-btn" onclick="addKeyframe()">+ KEY</button>
</div>
