<!-- 
    MDS Exposure Sheet
    
    Same column-order philosophy as SSS, but no SD/PH columns (MDS uses 
    Start/Stop sub-rows for smear definition, not shutter sweep timing).
    The TYPE column carries over from the existing MDS layout.
-->
<div class="vop-sheet mds-sheet">
    <div class="sheet-row mds-header">
        <div>#</div>
        <div data-title="Frame Number">FR</div>
        <div data-title="Interpolation Mode">INT</div>
        <div data-title="Corner/Sharp Turn">C</div>
        <div data-title="Node Type">TYPE</div>
        
        <!-- JK Printer: ProjMag layer -->
        <div data-title="ProjMag Gate Frame Anchor (empty = inherit)" class="pm-jk-cell">PM<br>GATE</div>
        <div data-title="ProjMag Camera-Frame Hold (CAM:STP, x)" class="pm-jk-cell">PM<br>CAM</div>
        <div data-title="ProjMag Gate-Frame Step (CAM:STP, y, signed)" class="pm-jk-cell">PM<br>STP</div>
        
        <!-- JK Printer: BiPack layer -->
        <div data-title="BiPack Gate Frame Anchor (empty = inherit)" class="bp-jk-cell bp-header-text">BP<br>GATE</div>
        <div data-title="BiPack Camera-Frame Hold (CAM:STP, x)" class="bp-jk-cell bp-header-text">BP<br>CAM</div>
        <div data-title="BiPack Gate-Frame Step (CAM:STP, y, signed)" class="bp-jk-cell bp-header-text">BP<br>STP</div>
        
        <!-- Spatial -->
        <div data-title="ProjMag Position (X,Y,Z)">PM POS<br>(X,Y,Z)</div>
        <div data-title="ProjMag Rotation (P,R,Y)">PM ROT<br>(P,R,Y)</div>
        <div data-title="BiPack Position (X,Y,Z)" class="bp-header-text">BP POS<br>(X,Y,Z)</div>
        <div data-title="BiPack Rotation (P,R,Y)" class="bp-header-text">BP ROT<br>(P,R,Y)</div>
        
        <!-- Light & exposure -->
        <div data-title="Projector Gel">PG</div>
        <div data-title="Camera Gel">CG</div>
        <div data-title="Exposure Time (Sec)">EXP</div>
        <div></div>
    </div>
    <div id="mds_sheet_body"></div>
</div>
<div class="add-row">
    <button class="mds-add-btn" onclick="addMDSKeyframe()">+ ADD MDS MASTER KEY</button>
</div>
